<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tarjetas de Estudio · IA aplicada a formación digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── PALETA VERDE EDUCATIVA ── */
  --pri:#1a6b4a;          /* verde principal oscuro */
  --pri-light:#28a06e;    /* verde medio */
  --pri-pale:#e6f5ee;     /* verde muy claro bg */
  --pri-line:rgba(26,107,74,.25);
  --forest:#0f3d2b;       /* verde muy oscuro para headers */
  --sage:#4a8c6f;         /* verde suave */

  --ink:#1c2b23;--ink-soft:#3d5347;--ink-dim:#7a9488;
  --paper:#f4f8f5;--white:#ffffff;
  --line:rgba(26,107,74,.14);--line-soft:rgba(28,43,35,.08);

  --ok:#2d8659;--ok-bg:#e8f5ee;--ok-line:rgba(45,134,89,.4);
  --warn:#b8860b;--warn-bg:#fdf6e3;--warn-line:rgba(184,134,11,.35);
  --err:#c0392b;--err-bg:#fdecea;--err-line:rgba(192,57,43,.35);

  --sidebar-w:290px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;color:var(--ink);
  background:linear-gradient(170deg,#eef5f0 0%,var(--paper) 40%,#e4ede7 100%);background-attachment:fixed}

/* ── SIDEBAR ── */
.ov{position:fixed;inset:0;background:rgba(15,61,43,.35);z-index:40;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.show{opacity:1;pointer-events:auto}
.sb{position:fixed;top:0;left:calc(var(--sidebar-w)*-1 - 20px);width:var(--sidebar-w);height:100%;
  background:var(--white);border-right:1px solid var(--line);z-index:50;
  display:flex;flex-direction:column;transition:left .35s cubic-bezier(.4,0,.2,1);
  box-shadow:8px 0 30px rgba(15,61,43,.10);overflow:hidden}
.sb.open{left:0}
.sb-hd{padding:20px 18px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--forest) 0%,var(--pri) 100%)}
.sb-hd img{width:44px;height:44px;object-fit:contain;border-radius:10px;background:rgba(255,255,255,.95);padding:3px}
.sb-hd h2{font-family:'DM Serif Display';font-weight:400;font-size:16px;color:#fff;line-height:1.2}
.sb-hd h2 span{display:block;font-family:'DM Sans';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:3px}
.sb-bd{flex:1;overflow-y:auto;padding:6px 0}
.sb-sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);padding:14px 18px 6px;font-weight:700}
.sb-it{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;font-size:13.5px;color:var(--ink-soft);
  border-left:3px solid transparent;transition:all .16s}
.sb-it:hover{background:var(--pri-pale);color:var(--ink)}
.sb-it.on{border-left-color:var(--pri);color:var(--pri);font-weight:600;background:var(--pri-pale)}
.sb-it .ct{margin-left:auto;font-size:11px;background:var(--paper);border:1px solid var(--line);border-radius:99px;padding:1px 8px;color:var(--ink-dim);font-weight:500}
.sb-rnd{display:flex;align-items:center;gap:9px;padding:10px 18px;cursor:pointer;font-size:13.5px;font-weight:600;
  color:var(--forest);border-left:3px solid transparent;transition:all .16s}
.sb-rnd:hover{background:var(--pri-pale);color:var(--pri)}
.sb-rnd.on{border-left-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
.sb-rnd svg{width:17px;height:17px;flex:0 0 auto}
.sb-ft{padding:14px 18px;border-top:1px solid var(--line);flex:0 0 auto}
.sb-ft .lb{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:5px;font-weight:700}
.sb-ft .br{height:5px;border-radius:99px;background:rgba(26,107,74,.12);overflow:hidden}
.sb-ft .br i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pri),var(--pri-light));transition:width .4s}
.sb-ft .st{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--ink-dim)}
.sb-x{position:absolute;top:14px;right:12px;width:30px;height:30px;border:none;background:rgba(255,255,255,.15);cursor:pointer;
  color:#fff;font-size:18px;display:grid;place-items:center;border-radius:8px}
.sb-x:hover{background:rgba(255,255,255,.25)}

/* ── MAIN ── */
.mn{height:100%;display:flex;flex-direction:column}
.tb{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:none;flex:0 0 auto;
  background:linear-gradient(135deg,var(--forest) 0%,var(--pri) 100%)}
.hm{width:38px;height:38px;border:1px solid rgba(255,255,255,.25);border-radius:10px;background:none;cursor:pointer;
  display:grid;place-items:center;color:rgba(255,255,255,.85);flex:0 0 auto;transition:all .2s}
.hm:hover{border-color:#fff;color:#fff}
.hm svg{width:19px;height:19px}
.tb .ta{flex:1;min-width:0}
.tb .cn{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:700}
.tb .tn{font-family:'DM Serif Display';font-size:19px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb .tc{font-size:11px;color:rgba(255,255,255,.6)}
.mb{display:flex;gap:5px;flex:0 0 auto;align-items:center}
.mbtn{font-family:'DM Sans';font-size:11px;letter-spacing:.04em;text-transform:uppercase;font-weight:700;
  padding:6px 12px;border:1.5px solid rgba(255,255,255,.35);border-radius:8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);cursor:pointer;transition:all .2s}
.mbtn:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.2)}
.mbtn.on{background:#fff;color:var(--pri);border-color:#fff}
.mbtn.rep{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5);color:#fff}
.mbtn.rep:hover{background:rgba(255,255,255,.3);border-color:#fff}
.mute-btn{width:32px;height:32px;border:1px solid rgba(255,255,255,.25);border-radius:8px;background:none;cursor:pointer;
  display:grid;place-items:center;color:rgba(255,255,255,.7);flex:0 0 auto;transition:all .2s;font-size:15px}
.mute-btn:hover{border-color:#fff;color:#fff}
.mute-btn.muted{color:rgba(255,255,255,.35)}

/* ── CARD AREA ── */
.ca{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 18px;overflow-y:auto}
.ca>.cd,.ca>.empty,.ca>.ban{margin-top:auto;margin-bottom:auto}
.empty{text-align:center;color:var(--ink-dim);font-size:14.5px;max-width:400px;line-height:1.65}
.empty b{color:var(--pri);display:block;font-family:'DM Serif Display';font-size:26px;margin-bottom:8px}
.empty .sub{margin-top:10px;font-size:12.5px}

/* Banner */
.ban{text-align:center;animation:banIn .5s ease both}
.ban .ic{font-size:44px;margin-bottom:8px}
.ban h3{font-family:'DM Serif Display';font-size:26px;color:var(--forest);margin-bottom:4px}
.ban p{color:var(--ink-soft);font-size:14px}
.ban .bg{display:inline-block;margin-top:12px;padding:4px 14px;border-radius:99px;font-size:11px;
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--pri-pale);color:var(--pri);border:1px solid var(--pri-line)}
@keyframes banIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── COMPLETION PANEL ── */
.done-panel{max-width:620px;width:100%;animation:banIn .5s ease both;text-align:center;margin-top:12px}
.done-hd{padding:40px 24px 24px;border-radius:18px 18px 0 0;position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,.12) 25%,transparent 50%),linear-gradient(135deg,var(--forest),var(--pri))}
.done-hd .ic{display:none}
.done-hd h3{font-family:'DM Serif Display';font-size:24px;color:#fff;margin-bottom:2px}
.done-hd .sub{font-size:13px;color:rgba(255,255,255,.7)}
.done-bd{background:var(--white);border:1px solid var(--line);border-top:none;border-radius:0 0 18px 18px;padding:24px}
.score-ring{width:130px;height:130px;margin:0 auto 14px;position:relative}
.score-ring svg{width:100%;height:100%}
.score-ring .pct{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.score-ring .pct b{font-family:'DM Serif Display';font-size:36px;color:var(--ink);line-height:1}
.score-ring .pct span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim)}
.grade-badge{display:inline-block;font-family:'DM Sans';font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  padding:5px 16px;border-radius:99px;margin-bottom:12px;border:1.5px solid}
.done-stats{display:flex;gap:10px;justify-content:center;margin:16px 0}
.done-stat{flex:1;max-width:120px;padding:12px 8px;border-radius:12px;border:1px solid var(--line-soft);text-align:center}
.done-stat b{display:block;font-family:'DM Serif Display';font-size:24px;line-height:1.2}
.done-stat span{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim)}
.done-stat.s-ok b{color:var(--ok)}.done-stat.s-warn b{color:var(--warn)}.done-stat.s-err b{color:var(--err)}
.done-fb{margin:18px 0 0;padding:18px;border-radius:14px;text-align:left;border:1px solid}
.done-fb .fb-hd{font-family:'DM Serif Display';font-size:17px;margin-bottom:6px}
.done-fb p{font-size:14px;line-height:1.6;color:var(--ink-soft);margin:0}
.done-fb.fb-ok{background:var(--ok-bg);border-color:var(--ok-line)}.done-fb.fb-ok .fb-hd{color:var(--ok)}
.done-fb.fb-warn{background:var(--warn-bg);border-color:var(--warn-line)}.done-fb.fb-warn .fb-hd{color:var(--warn)}
.done-fb.fb-err{background:var(--err-bg);border-color:var(--err-line)}.done-fb.fb-err .fb-hd{color:var(--err)}
.done-tips{margin-top:14px;text-align:left}
.done-tips .tip-hd{font-family:'DM Sans';font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px}
.done-tips .tip{display:flex;gap:10px;align-items:flex-start;padding:8px 0;font-size:13.5px;color:var(--ink-soft);line-height:1.5}
.done-tips .tip .ti{flex:0 0 auto;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:12px;background:var(--pri-pale);color:var(--pri)}
.done-act{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.done-act button{font-family:'DM Sans';font-weight:700;font-size:13px;padding:12px 24px;border-radius:12px;border:none;cursor:pointer;transition:all .18s}
.done-act .act-pri{background:var(--pri);color:#fff}
.done-act .act-pri:hover{filter:brightness(1.1)}
.done-act .act-sec{background:var(--white);color:var(--ink-soft);border:1px solid var(--line)}
.done-act .act-sec:hover{border-color:var(--pri);color:var(--pri)}

/* ── SIDEBAR STATS ── */
.sb-stats{padding:12px 18px;border-top:1px solid var(--line);flex:0 0 auto}
.sb-stats .lb{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;font-weight:700}
.sb-stats .row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;color:var(--ink-soft)}
.sb-stats .row b{font-weight:700}
.sb-stats .row .val{font-family:'DM Serif Display';font-size:15px;color:var(--ink)}
.sb-stats .mini-bar{height:4px;border-radius:99px;background:var(--line-soft);margin-top:8px;overflow:hidden}
.sb-stats .mini-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pri),var(--pri-light));transition:width .4s}
.sb-it .done-check{color:var(--ok);font-size:14px;margin-right:2px}

/* ── CARD (bigger) ── */
.cd{width:100%;max-width:680px;border-radius:20px;border:1px solid var(--line);
  box-shadow:0 6px 24px rgba(15,61,43,.07);overflow:hidden;animation:cardIn .35s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.cd-tp{height:5px}
.cd-tp.q{background:var(--pri)}
.cd-tp.ok{background:var(--ok)}
.cd-tp.ko{background:var(--err)}
.cd-bd{padding:36px 34px;min-height:310px;display:flex;flex-direction:column}
.cd-bd.w{background:var(--white)}
.cd-bd.g{background:var(--ok-bg)}
.cd-bd.r{background:var(--err-bg)}
.cd .tg{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:16px;font-weight:700;display:flex;justify-content:space-between}
.cd .tg .ix{color:var(--pri);font-weight:800}
.cd .qq{font-family:'DM Serif Display';font-size:clamp(21px,4.2vw,28px);line-height:1.35;color:var(--ink);flex:1;display:flex;align-items:center;justify-content:center;text-align:center}
.cd .at{font-family:'DM Sans';font-size:clamp(16px,3.5vw,20px);color:var(--ink-soft);line-height:1.6;flex:1}
.cd .at b{color:var(--ink)}
.cd .ex{margin-top:18px;padding-top:16px;border-top:1px solid var(--line-soft);font-size:14.5px;color:var(--ink-soft);line-height:1.6}
.cd .ex .el{font-weight:700;color:var(--err);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.cd .al{font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.cd .al.gn{color:var(--ok)}
.cd .al.rd{color:var(--err)}
.cd .tmr{height:3px;background:rgba(26,107,74,.12);border-radius:99px;overflow:hidden;margin-top:18px}
.cd .tmr i{display:block;height:100%;border-radius:99px;transition:width linear}
.cd .skip-btn{display:block;margin:14px auto 0;font-family:'DM Sans';font-weight:600;font-size:13px;padding:9px 22px;
  border-radius:10px;border:1px solid var(--line-soft);background:var(--white);color:var(--ink-soft);cursor:pointer;transition:all .18s}
.cd .skip-btn:hover{border-color:var(--pri);color:var(--pri)}
.cd-flash{animation:dudoFlash .35s ease}
@keyframes dudoFlash{0%{border-color:var(--line)}30%{border-color:var(--warn);box-shadow:0 0 0 4px rgba(194,123,26,.2)}100%{border-color:var(--line);box-shadow:none}}

/* Progress dots */
.dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;max-width:680px;margin-top:14px}
.dots i{width:10px;height:10px;border-radius:99px;border:1.5px solid var(--line);background:var(--white);transition:all .2s}
.dots i.cur{border-color:var(--pri);background:var(--pri-pale);transform:scale(1.3)}
.dots i.yes{background:var(--ok);border-color:var(--ok)}
.dots i.dbt{background:var(--warn);border-color:var(--warn)}
.dots i.no{background:var(--err);border-color:var(--err)}

/* ── CONTROLS ── */
.ct{flex:0 0 auto;padding:12px 18px 24px;display:flex;flex-direction:column;gap:10px;align-items:center}
.ms{display:flex;gap:10px;justify-content:center;width:100%;max-width:540px}
.mb2{flex:1;font-family:'DM Sans';font-weight:700;font-size:13px;padding:14px 8px;
  border-radius:12px;border:1px solid;cursor:pointer;transition:all .18s;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px}
.mb2 svg{width:17px;height:17px;flex:0 0 auto}
.mb2.no{border-color:var(--err-line);background:var(--err-bg);color:var(--err)}
.mb2.no:hover{background:var(--err);color:#fff}
.mb2.dbt{border-color:var(--warn-line);background:var(--warn-bg);color:var(--warn)}
.mb2.dbt:hover{background:var(--warn);color:#fff}
.mb2.yes{border-color:var(--ok-line);background:var(--ok-bg);color:var(--ok)}
.mb2.yes:hover{background:var(--ok);color:#fff}
.mb2:disabled{opacity:.4;cursor:not-allowed}

.nv{display:flex;gap:10px;justify-content:center;align-items:center;width:100%;max-width:540px}
.nb{width:46px;height:46px;border:1px solid var(--line);border-radius:12px;background:var(--white);
  cursor:pointer;display:grid;place-items:center;color:var(--ink-soft);transition:all .2s;flex:0 0 auto}
.nb:hover:not(:disabled){border-color:var(--pri);color:var(--pri)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.nb svg{width:18px;height:18px}
.nv .ctr{font-family:'DM Serif Display';font-size:22px;color:var(--ink);min-width:80px;text-align:center}
.nv .ctr span{color:var(--ink-dim);font-size:17px}
.kh{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.kh span{font-size:10.5px;color:var(--ink-dim)}
.kh kbd{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:'DM Sans';font-size:10px;margin:0 2px}

@media(max-width:700px){
  :root{--sidebar-w:275px}
  .cd-bd{padding:26px 22px;min-height:250px}
  .ms{gap:7px}.mb2{font-size:12px;padding:12px 6px}
  .kh{display:none}
  .mb{gap:4px}.mbtn{padding:5px 9px;font-size:10px}
  .tb .tn{font-size:16px}
  .dots i{width:8px;height:8px}
}
@media(min-width:1100px){
  .sb{left:0;box-shadow:none}.sb.open{left:0}
  .ov{display:none!important}
  .mn{margin-left:var(--sidebar-w)}
  .hm{display:none}.sb-x{display:none}
}
</style>
</head>
<body>

<div class="ov" id="ov" onclick="togSb()"></div>
<nav class="sb" id="sb">

const AC=window.AudioContext||window.webkitAudioContext;let _c=null;
let muted=false;
function toggleMute(){muted=!muted;const b=$('muteBtn');b.textContent=muted?'🔇':'🔊';b.classList.toggle('muted',muted)}
function ac(){if(!_c)_c=new AC();return _c}
function snd(notes,type,vol,dur,gap){if(muted)return;try{const c=ac(),t=c.currentTime;notes.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(0,t+i*gap);g.gain.linearRampToValueAtTime(vol,t+i*gap+.04);g.gain.exponentialRampToValueAtTime(.001,t+i*gap+dur);o.connect(g);g.connect(c.destination);o.start(t+i*gap);o.stop(t+i*gap+dur+.05)})}catch(e){}}

function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}
function ck(c){return c._tid+'-'+c._ci}

let mode='home',tIdx=-1,deck=[],idx=0,busy=false,mst={};

/* Estadísticas acumuladas por tema */
let cumStats = {};
TOPICS.forEach((t,i)=>{ cumStats[t.id]={completed:false,yes:0,doubt:0,no:0,sessions:0,bestPct:0} });

function mkPool(ti){const t=TOPICS[ti];return t.cards.map((c,i)=>({...c,_tid:t.id,_tn:t.name,_ci:i}))}
function mkTopic(ti){const p=shuf(mkPool(ti));return p.slice(0,Math.min(PER_SESSION,p.length))}
function mkRandom(){let a=[];TOPICS.forEach((t,i)=>a.push(...mkPool(i)));return shuf(a).slice(0,RANDOM_SIZE)}
function mkReview(){let a=[];TOPICS.forEach((t,i)=>mkPool(i).forEach(c=>{const m=mst[ck(c)];if(m==='doubt'||m==='no')a.push(c)}));return shuf(a)}

function startReview(){
  mode='review';tIdx=-1;deck=mkReview();idx=0;busy=false;rSb();
  if(!deck.length){home('¡Sin pendientes!','Dominas todas las tarjetas vistas. Selecciona un tema nuevo.');$('cT').style.display='none'}
  else banner('Modo Repaso',deck.length,'📋');
}
function goHome(){mode='home';tIdx=-1;deck=[];idx=0;busy=false;homeScreen();rSb()}

/* ── UI HELPERS ── */
const $=id=>document.getElementById(id);
function banner(name,cnt,ic){
  $('cA').innerHTML=`<div class="ban"><div class="ic">${ic}</div><h3>${name}</h3><p>${cnt} tarjetas seleccionadas</p><div class="bg">Sesión nueva cada inicio</div></div>`;
  $('cT').style.display='none';rTb();
  setTimeout(()=>{showQ();$('cT').style.display=''},1600);
}
function homeScreen(){
  $('cA').innerHTML=`<div class="empty"><b>Selecciona un tema</b>Elige un tema del menú lateral para comenzar, o pulsa «Aleatorio» para mezclar tarjetas de todos los temas.<div class="sub">Pool de 40 tarjetas por tema · ${PER_SESSION} por sesión</div></div>`;
  $('cT').style.display='none';$('tN').textContent=COURSE_NAME;$('tC').textContent='Elige un tema para empezar';
}
function home(t,m){$('cA').innerHTML=`<div class="empty"><b>${t}</b>${m}</div>`}

/* ── COMPLETE ── */
function onDone(){
  sDone();$('cT').style.display='none';
  const y=deck.filter(c=>mst[ck(c)]==='yes').length;
  const d=deck.filter(c=>mst[ck(c)]==='doubt').length;
  const n=deck.filter(c=>mst[ck(c)]==='no').length;
  const total=y+d+n;
  /* Solo "Lo sé" cuenta como dominio. "Dudo" y "No lo sé" no suman. */
  const pct=total?Math.round(y/total*100):0;

  /* Actualizar estadísticas acumuladas */
  if(mode==='topic'&&tIdx>=0){
    const tid=TOPICS[tIdx].id;
    cumStats[tid].completed=true;
    cumStats[tid].yes+=y;
    cumStats[tid].doubt+=d;
    cumStats[tid].no+=n;
    cumStats[tid].sessions++;
    if(pct>cumStats[tid].bestPct) cumStats[tid].bestPct=pct;
  } else if(mode==='random'||mode==='review'){
    deck.forEach(c=>{
      const m=mst[ck(c)];
      if(m&&cumStats[c._tid]){
        /* No duplicar — ya se contó arriba en modo topic */
      }
    });
  }

  /* Determinar nivel y feedback */
  let grade,gradeColor,fbClass,fbTitle,fbMsg,scoreDetail;
  let tips=[];
  scoreDetail=`Solo las tarjetas "Lo sé" (${y} de ${total}) cuentan como dominadas.`;

  if(pct>=90){
    grade='Sobresaliente';gradeColor='var(--ok)';fbClass='fb-ok';
    fbTitle='Dominio excelente';
    fbMsg='Conoces el tema con seguridad. La gran mayoría de tarjetas las dominaste sin dudar.';
    tips=[
      'Repasa este tema de forma espaciada (cada 3-5 días) para consolidar la memoria a largo plazo.',
      'Intenta explicar los conceptos con tus propias palabras: enseñar es la mejor forma de afianzar.',
      'Avanza al siguiente tema con confianza.'
    ];
  } else if(pct>=75){
    grade='Notable';gradeColor='var(--pri)';fbClass='fb-ok';
    fbTitle='Buen nivel, estás cerca del dominio';
    fbMsg=`Dominaste ${y} de ${total} tarjetas con seguridad.${d>0?` Las ${d} que marcaste como "Dudo" son conceptos que reconoces pero aún no tienes claros.`:''} Tu siguiente paso es convertir esos "Dudo" en "Lo sé".`;
    tips=[
      'Usa el modo Repaso para trabajar solo las tarjetas que marcaste como "Dudo" — son las de mayor impacto ahora.',
      'Reformula cada concepto dudoso con tus propias palabras antes de volver a intentar.',
      'Repite este tema en 1-2 días: la repetición espaciada mejora la retención significativamente.'
    ];
  } else if(pct>=50){
    grade='Aprobado justo';gradeColor='var(--warn)';fbClass='fb-warn';
    fbTitle='Conocimiento insuficiente — necesitas reforzar';
    fbMsg=`Solo dominaste ${y} de ${total} tarjetas.${d>0?` Las ${d} marcadas como "Dudo" indican que reconoces los conceptos pero no los tienes asimilados.`:''} ${n>0?`Y ${n} directamente no las sabías.`:''} Necesitas repasar antes de avanzar.`;
    tips=[
      'No avances al siguiente tema. Repite este completo: las tarjetas se barajarán y verás preguntas diferentes del pool.',
      d>0?`Céntrate en las ${d} tarjetas de "Dudo": son conceptos que ya reconoces y que con una revisión más se convertirán en "Lo sé".`:'',
      n>0?'Las tarjetas de "No lo sé" requieren volver al material teórico antes de reintentar.':'',
      'Toma notas a mano de los conceptos clave. Escribir activa circuitos de memoria diferentes a leer.'
    ].filter(t=>t);
  } else {
    grade='Necesita mejorar';gradeColor='var(--err)';fbClass='fb-err';
    fbTitle='Este tema necesita mucha más dedicación';
    fbMsg=`Solo ${y} de ${total} tarjetas las dominaste con seguridad.${d>0?` Dudaste en ${d}`:''} ${n>0?`y no supiste ${n}`:''}.  El tema no está asimilado y necesita trabajo serio.`;
    tips=[
      'Vuelve al material teórico de este tema antes de repetir las tarjetas.',
      'Divide el estudio en bloques: repasa 10 tarjetas, descansa 15 minutos, luego las otras 10.',
      'Busca relaciones entre conceptos: conectar ideas nuevas con conocimiento previo ayuda a recordarlas.',
      'No tengas prisa por avanzar. Dominar bien un tema es más valioso que ver muchos superficialmente.'
    ];
  }

  /* Ring SVG */
  const C=2*Math.PI*52, off=C*(1-pct/100);
  const ringColor=pct>=75?'var(--ok)':pct>=50?'var(--warn)':'var(--err)';

  /* Tips HTML */
  let tipsHtml=tips.map((t,i)=>`<div class="tip"><span class="ti">${i+1}</span><span>${t}</span></div>`).join('');

  /* Next action */
  let actHtml='';
  if(mode==='topic'){
    const ni=tIdx+1;
    actHtml+=`<button class="act-sec" onclick="startTopic(${tIdx})">↻ Repetir tema</button>`;
    actHtml+=`<button class="act-sec" onclick="startReview()">Modo repaso</button>`;
    if(ni<TOPICS.length) actHtml+=`<button class="act-pri" onclick="startTopic(${ni})">Siguiente → ${TOPICS[ni].name}</button>`;
    else actHtml+=`<button class="act-pri" onclick="goHome()">🏆 ¡Todo completado!</button>`;
  } else {
    actHtml+=`<button class="act-sec" onclick="startReview()">Repetir repaso</button>`;
    actHtml+=`<button class="act-pri" onclick="goHome()">Volver al inicio</button>`;
  }

  $('cA').innerHTML=`
    <div class="done-panel">
      <div class="done-hd">
        <div class="ic"></div>
        <h3>${mode==='topic'?TOPICS[tIdx].name+' completado':'Sesión completada'}</h3>
        <div class="sub">${total} tarjetas respondidas</div>
      </div>
      <div class="done-bd">
        <div class="score-ring">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--line-soft)" stroke-width="8"/>
            <circle cx="60" cy="60" r="52" fill="none" stroke="${ringColor}" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/>
          </svg>
          <div class="pct"><b>${pct}%</b><span>Dominio</span></div>
        </div>
        <div class="grade-badge" style="color:${gradeColor};border-color:${gradeColor}">${grade}</div>
        <p style="font-size:12px;color:var(--ink-dim);margin:-4px 0 6px;text-align:center">${scoreDetail}</p>
        <div class="done-stats">
          <div class="done-stat s-ok"><b>${y}</b><span>Lo sé</span></div>
          <div class="done-stat s-warn"><b>${d}</b><span>Dudo</span></div>
          <div class="done-stat s-err"><b>${n}</b><span>No lo sé</span></div>
        </div>
        <div class="done-fb ${fbClass}">
          <div class="fb-hd">${fbTitle}</div>
          <p>${fbMsg}</p>
        </div>
        <div class="done-tips">
          <div class="tip-hd">Consejos de estudio</div>
          ${tipsHtml}
        </div>
        <div class="done-act">${actHtml}</div>
      </div>
    </div>`;
  rSb();rGlobalStats();
  /* Update topbar to show completion */
  $('tC').textContent=`${total} tarjetas completadas`;
}

/* ── CARD VIEWS ── */
function showQ(){
  busy=false;
  if(!deck.length||idx>=deck.length){onDone();return}
  $('cT').style.display='';
  const c=deck[idx];
  $('cA').innerHTML=`<div class="cd"><div class="cd-tp q"></div><div class="cd-bd w">
    <div class="tg"><span class="ix">${idx+1}/${deck.length}</span><span>${c._tn}</span></div>
    <div class="qq">${c.f}</div></div></div>${dots()}`;
  setBtns(true);rTb();rProg();
}

function showOk(c){
  $('cA').innerHTML=`<div class="cd"><div class="cd-tp ok"></div><div class="cd-bd g">
    <div class="tg"><span class="ix">${idx+1}/${deck.length}</span><span>${c._tn}</span></div>
    <div class="al gn">✓ Respuesta</div><div class="at">${c.b}</div>
    <div class="tmr"><i id="tb" style="width:100%;background:var(--ok)"></i></div>
    <button class="skip-btn" onclick="skipTimer()">Continuar →</button></div></div>${dots()}`;
  raf(()=>{const b=$('tb');if(b){b.style.transition='width 3s linear';raf(()=>{b.style.width='0%'})}});
}

function showKo(c){
  $('cA').innerHTML=`<div class="cd"><div class="cd-tp ko"></div><div class="cd-bd r">
    <div class="tg"><span class="ix">${idx+1}/${deck.length}</span><span>${c._tn}</span></div>
    <div class="al rd">✗ No lo sabías</div><div class="at"><b>${c.b}</b></div>
    <div class="ex"><div class="el">¿Por qué?</div>${c.e}</div>
    <div class="tmr"><i id="tb" style="width:100%;background:var(--err)"></i></div>
    <button class="skip-btn" onclick="skipTimer()">Continuar →</button></div></div>${dots()}`;
  raf(()=>{const b=$('tb');if(b){b.style.transition='width 5s linear';raf(()=>{b.style.width='0%'})}});
}

function raf(fn){requestAnimationFrame(()=>requestAnimationFrame(fn))}

function dots(){
  if(deck.length>40)return '';
  let h='<div class="dots">';
  deck.forEach((c,i)=>{
    const m=mst[ck(c)];
    let cls=i===idx?'cur':'';
    if(m==='yes')cls='yes';else if(m==='doubt')cls='dbt';else if(m==='no')cls='no';
    h+=`<i class="${cls}"></i>`;
  });
  return h+'</div>';
}

/* ── MARK ── */
function skipTimer(){clr();idx++;showQ()}

function mark(lv){
  if(busy||!deck.length||idx>=deck.length)return;
  busy=true;
  const c=deck[idx];
  mst[ck(c)]=lv;
  rProg();
  clr();

  if(lv==='yes'){
    sOk();showOk(c);setBtns(false);
    window._t=setTimeout(()=>{idx++;showQ()},3200);
  } else if(lv==='doubt'){
    sDbt();setBtns(false);
    /* Flash ámbar visual antes de avanzar */
    const card=document.querySelector('.cd');
    if(card) card.classList.add('cd-flash');
    setTimeout(()=>{idx++;showQ()},350);
  } else {
    sNo();showKo(c);setBtns(false);
    window._t=setTimeout(()=>{idx++;showQ()},5200);
  }
}

/* Navigation always works — cancels any pending timer */
function go(dir){
  clr();
  const ni=idx+dir;
  if(ni<0||ni>=deck.length)return;
  idx=ni;busy=false;showQ();
}
function clr(){clearTimeout(window._t)}

function setBtns(on){$('bN').disabled=!on;$('bD').disabled=!on;$('bY').disabled=!on}

/* ── RENDERS ── */
function rTb(){
  let n=COURSE_NAME;
  if(mode==='topic'&&tIdx>=0)n=TOPICS[tIdx].name;
  else if(mode==='random')n='Modo Aleatorio';
  else if(mode==='review')n='Modo Repaso';
  $('tN').textContent=n;
  $('tC').textContent=deck.length?(idx<deck.length?`Tarjeta ${idx+1} de ${deck.length}`:`${deck.length} completadas`):'';
}

function rSb(){
  let h=`<div class="sb-sec">Temas</div>`;
  TOPICS.forEach((t,i)=>{
    const cs=cumStats[t.id];
    const check=cs.completed?'<span class="done-check">✓</span>':'';
    const best=cs.completed?` · ${cs.bestPct}%`:'';
    h+=`<div class="sb-it ${mode==='topic'&&tIdx===i?'on':''}" onclick="startTopic(${i})">${check}${t.name} <span class="ct">${t.cards.length}${best}</span></div>`;
  });
  h+=`<div class="sb-sec" style="margin-top:4px">Modos</div>`;
  h+=`<div class="sb-rnd ${mode==='random'?'on':''}" onclick="startRandom()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
    Aleatorio · ${RANDOM_SIZE} tarjetas</div>`;
  h+=`<div class="sb-rnd ${mode==='review'?'on':''}" onclick="startReview()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
    Repaso</div>`;
  $('sbB').innerHTML=h;
  rGlobalStats();
}

function rGlobalStats(){
  const completed=TOPICS.filter(t=>cumStats[t.id].completed).length;
  const totalTopics=TOPICS.length;
  const totalYes=Object.values(cumStats).reduce((s,c)=>s+c.yes,0);
  const totalDoubt=Object.values(cumStats).reduce((s,c)=>s+c.doubt,0);
  const totalNo=Object.values(cumStats).reduce((s,c)=>s+c.no,0);
  const totalCards=totalYes+totalDoubt+totalNo;
  const totalSessions=Object.values(cumStats).reduce((s,c)=>s+c.sessions,0);
  const avgPct=totalCards?Math.round(totalYes/totalCards*100):0;
  const compPct=Math.round(completed/totalTopics*100);

  let h=`<div class="lb">Estadísticas totales</div>`;
  h+=`<div class="row"><span>Temas completados</span><span class="val">${completed}/${totalTopics}</span></div>`;
  h+=`<div class="mini-bar"><i style="width:${compPct}%"></i></div>`;
  if(totalCards>0){
    h+=`<div class="row" style="margin-top:8px"><span>Tarjetas vistas</span><span class="val">${totalCards}</span></div>`;
    h+=`<div class="row"><span>Sesiones</span><span class="val">${totalSessions}</span></div>`;
    h+=`<div class="row"><span>Dominio global</span><span class="val" style="color:${avgPct>=75?'var(--ok)':avgPct>=50?'var(--warn)':'var(--err)'}">${avgPct}%</span></div>`;
    h+=`<div class="row"><span style="color:var(--ok)">✓ ${totalYes}</span><span style="color:var(--warn)">? ${totalDoubt}</span><span style="color:var(--err)">✗ ${totalNo}</span></div>`;
  }
  $('sbStats').innerHTML=h;
}

function rProg(){
  if(!deck.length){$('gP').style.width='0%';$('gS').textContent='';$('gPc').textContent='';return}
  const d=deck.filter(c=>mst[ck(c)]).length;
  const p=Math.round(d/deck.length*100);
  $('gP').style.width=p+'%';
  $('gS').textContent=d+' de '+deck.length;
  $('gPc').textContent=p+'%';
}

function togSb(){$('sb').classList.toggle('open');$('ov').classList.toggle('show')}

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();if(busy&&window._t){skipTimer()}}
  if(e.key==='ArrowLeft'){e.preventDefault();go(-1)}
  if(e.key==='ArrowRight'){e.preventDefault();go(1)}
  if(e.key==='1')mark('no');
  if(e.key==='2')mark('doubt');
  if(e.key==='3')mark('yes');
});
/* Swipe */
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].screenX-tx;if(Math.abs(dx)>60){dx>0?go(-1):go(1)}},{passive:true});

/* INIT */
homeScreen();rSb();rGlobalStats();
</script>
</body>
</html>
